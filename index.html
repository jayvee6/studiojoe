<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Joe</title>
  <meta name="description" content="Code, camera, and everything in between. Built with intention.">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font:      -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                   "Helvetica Neue", Arial, sans-serif;
      --bg:        #000000;
      --bg-g:      radial-gradient(ellipse at 35% 15%, #1A237E 0%, #191970 28%, #0d0d3a 58%, #050510 100%);
      --label-1:   rgba(255,255,255,0.92);
      --label-2:   rgba(255,255,255,0.55);
      --label-3:   rgba(255,255,255,0.25);
      --accent:    #0A84FF;
      --accent-bg: rgba(10,132,255,0.12);
      --fill-1:    rgba(255,255,255,0.04);
      --fill-2:    rgba(255,255,255,0.08);
      --sep:       rgba(255,255,255,0.09);
      --glass-bg:  rgba(255,255,255,0.05);
      --glass-bdr: rgba(255,255,255,0.10);
      --glass-shd: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    [data-theme="light"] {
      --bg:        #E8F4FF;
      --bg-g:      linear-gradient(175deg, #0096FF 0%, #1E90FF 28%, #5BB8FF 52%, #C8E8FF 72%, #EEF7FF 100%);
      --label-1:   #001E3C;
      --label-2:   rgba(0,30,60,0.55);
      --label-3:   rgba(0,30,60,0.28);
      --accent:    #E8450A;
      --accent-bg: rgba(232,69,10,0.28);
      --fill-1:    rgba(0,100,200,0.05);
      --fill-2:    rgba(0,100,200,0.09);
      --sep:       rgba(0,80,180,0.12);
      --glass-bg:  rgba(200,230,255,0.68);
      --glass-bdr: rgba(0,100,200,0.14);
      --glass-shd: 0 8px 40px rgba(0,50,120,0.12), inset 0 1px 0 rgba(255,255,255,0.85);
    }

    html {
      background: var(--bg);
      min-height: 100svh;
      transition: background 0.4s;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font);
      background: var(--bg-g);
      color: var(--label-1);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      transition: background 0.4s, color 0.4s;
    }

    /* ── Gobo lights ───────────────────────────────────── */
    #gobo {
      position: fixed; inset: 0; z-index: 6;
      pointer-events: none; overflow: hidden;
    }
    /* Color blobs: additive glow on dark, watercolor wash on light */
    .gobo-blob {
      position: absolute; border-radius: 50%;
      pointer-events: none; user-select: none;
      will-change: transform, opacity;
      mix-blend-mode: screen;
    }
    [data-theme="light"] .gobo-blob { mix-blend-mode: multiply; }


    /* ── Grain ─────────────────────────────────────────── */
    .grain {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035; mix-blend-mode: overlay;
    }


    /* ── Header ────────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000; height: 52px;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 clamp(24px, 5vw, 80px);
      border-bottom: 1px solid var(--sep);
      background: rgba(0,0,0,0.55);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      transition: background 0.3s, border-color 0.3s;
    }
    [data-theme="light"] header { background: rgba(0,100,200,0.35); }

    .wordmark {
      font-size: 15px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--label-1);
      text-decoration: none; transition: color 0.2s;
    }
    .wordmark:hover { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 4px; }

    nav { display: flex; align-items: center; gap: 4px; }
    nav a {
      font-size: 13px; font-weight: 500;
      color: var(--label-2); text-decoration: none;
      padding: 6px 12px; border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    nav a:hover { color: var(--label-1); background: var(--fill-2); }

    #theme-btn {
      width: 32px; height: 28px; border-radius: 7px;
      background: var(--fill-2); border: 1px solid var(--glass-bdr);
      color: var(--label-2); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-left: 8px; transition: background 0.2s, color 0.2s;
    }
    #theme-btn:hover { background: var(--fill-1); color: var(--label-1); }

    /* ── Hero — full viewport, centered ───────────────── */
    main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      /* top pad clears header (52px), bottom pad clears footer (44px) */
      padding: clamp(80px, 12vh, 140px) clamp(24px, 5vw, 80px) 44px;
      position: relative;
      z-index: 11; /* above gobo (6) — text always frontmost */
      min-height: clamp(560px, 100svh, 960px);
    }

    .hero-wordmark {
      font-size: clamp(0.75rem, 1.2vw, 1rem);
      font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--label-3);
      margin-bottom: clamp(28px, 5vh, 56px);
      opacity: 0;
    }

    .hero-hl {
      font-size: clamp(2.4rem, 6.5vw, 6.5rem);
      font-weight: 700; letter-spacing: -0.03em;
      line-height: 1.0; color: var(--label-1);
      max-width: 16ch;
      margin-bottom: 28px;
      opacity: 0;
    }
    .hero-hl .accent { color: var(--accent); }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 400; letter-spacing: -0.01em;
      color: var(--label-2);
      margin-bottom: clamp(40px, 6vh, 64px);
      opacity: 0;
    }

    /* Disciplines — plain dot-separated text */
    .disciplines {
      font-size: clamp(11px, 1.1vw, 13px);
      font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--label-2);
      margin-bottom: clamp(40px, 6vh, 64px);
      opacity: 0;
    }

    /* CTAs — text links only */
    .ctas {
      display: flex; align-items: center;
      justify-content: center; gap: 28px;
      flex-wrap: wrap; opacity: 0;
    }
    .cta-link {
      font-size: 14px; font-weight: 500;
      color: var(--label-2); text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.2s;
      display: flex; align-items: center; gap: 4px;
    }
    .cta-link:first-child { color: var(--accent); }
    .cta-link:hover { color: var(--label-1); }
    .cta-link:first-child:hover { filter: brightness(1.15); }

    /* ── Footer ────────────────────────────────────────── */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 999;
      padding: 0 clamp(24px, 5vw, 80px);
      height: 44px;
      background: linear-gradient(to top, rgba(0,0,0,0.40) 0%, transparent 100%);
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    [data-theme="light"] footer {
      background: linear-gradient(to top, rgba(0,20,80,0.28) 0%, transparent 100%);
    }
    .footer-sub {
      font-size: 11px; color: var(--label-3);
      letter-spacing: 0.04em;
    }
    .footer-links { display: flex; gap: 16px; }
    .footer-link {
      font-size: 11px; font-weight: 500; color: var(--label-3);
      text-decoration: none; letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .footer-link:hover { color: var(--accent); }
  </style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<div id="gobo"    aria-hidden="true"></div>

<!-- Header -->
<header>
  <a class="wordmark" href="/">Studio Joe</a>
  <nav>
    <a href="/resume.html">Resume</a>
    <a href="https://www.linkedin.com/in/joey-v-287ba5394" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://github.com/jayvee6" target="_blank" rel="noopener">GitHub</a>
    <button id="theme-btn" aria-label="Toggle theme">☀️</button>
  </nav>
</header>

<!-- Hero -->
<main>

  <h1 class="hero-hl" id="hh">
    Built with intention<span class="accent">.</span>
  </h1>

  <p class="disciplines" id="hd">
    Quality Engineering · Software Development · Video Production · Consulting
  </p>


</main>

<!-- Footer -->
<footer>
  <p class="footer-sub">© 2026 Studio Joe</p>
  <div class="footer-links">
    <a class="footer-link" href="/resume.html">Resume</a>
    <a class="footer-link" href="https://www.linkedin.com/in/joey-v-287ba5394" target="_blank" rel="noopener">LinkedIn ↗</a>
    <a class="footer-link" href="https://github.com/jayvee6" target="_blank" rel="noopener">GitHub ↗</a>
  </div>
</footer>

<script>
(function () {
  'use strict';

  const EASE = 'cubic-bezier(0.16, 1, 0.3, 1)';

  // ── Entrance animations ────────────────────────────────
  const tl = gsap.timeline({ defaults: { ease: EASE } });
  tl.to('#hh', { opacity: 1, duration: 0.75 },                    0.1)
    .fromTo('#hh', { y: 28 }, { y: 0, duration: 0.75 },          0.1)
    .to('#hd', { opacity: 1, duration: 0.5 },                     0.38)
    .fromTo('#hd', { y: 12 }, { y: 0, duration: 0.5 },           0.38)

  // ── Dark / Light toggle ────────────────────────────────
  const btn    = document.getElementById('theme-btn');
  let   isDark = (() => { try { return localStorage.getItem('theme') !== 'light'; } catch(e) { return true; } })();

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    btn.textContent = isDark ? '☀️' : '🌙';
  }

  btn.addEventListener('click', () => {
    isDark = !isDark;
    try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e) {}
    applyTheme();
  });

  applyTheme();

  // ── Perlin noise (Ken Perlin's improved algorithm) ────────
  const _pp = (function () {
    const s = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
    const p = new Uint8Array(512);
    for (let i = 0; i < 256; i++) p[i] = p[i + 256] = s[i];
    return p;
  })();

  function pnoise(x, y) {
    const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
    const xf = x - Math.floor(x),   yf = y - Math.floor(y);
    // Fade curve: 6t^5 - 15t^4 + 10t^3
    const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
    const u = fade(xf), v = fade(yf);
    // Gradient vectors — dot product of gradient with distance vector
    const grad = (h, dx, dy) => {
      const hh = h & 3, a = hh < 2 ? dx : dy, b = hh < 2 ? dy : dx;
      return ((hh & 1) ? -a : a) + ((hh & 2) ? -b : b);
    };
    const lerp = (t, a, b) => a + t * (b - a);
    const aa = _pp[_pp[xi]     + yi],  ab = _pp[_pp[xi]     + yi + 1];
    const ba = _pp[_pp[xi + 1] + yi],  bb = _pp[_pp[xi + 1] + yi + 1];
    return lerp(v,
      lerp(u, grad(aa, xf, yf),      grad(ba, xf - 1, yf)),
      lerp(u, grad(ab, xf, yf - 1),  grad(bb, xf - 1, yf - 1))
    );
  }

  // ── Gobo lights — warm nebula palette (Orion / Carina / Rosette) ─
  const _BLOBS = [
    { color: '#C44A00', w: 1100, h: 360, bl: 100, op: 0.62, rot:  -8 }, // Rust orange sweep
    { color: '#8B3200', w:  920, h: 300, bl:  88, op: 0.55, rot:  20 }, // Deep amber band
    { color: '#FF8C2A', w:  680, h: 240, bl:  72, op: 0.48, rot: -28 }, // Bright orange core
    { color: '#4B1080', w:  820, h: 340, bl: 110, op: 0.52, rot:  14 }, // Purple void
    { color: '#1A2A8A', w:  960, h: 280, bl: 115, op: 0.58, rot:  -6 }, // Deep blue space
    { color: '#D4820A', w:  580, h: 190, bl:  65, op: 0.44, rot:  40 }, // Golden highlight
    { color: '#6B1A00', w:  760, h: 270, bl:  82, op: 0.50, rot: -44 }, // Deep rust shadow
    { color: '#7B2FBF', w:  840, h: 230, bl:  96, op: 0.46, rot:  24 }, // Indigo-violet depth
  ];

  (function initGobos() {
    const container = document.getElementById('gobo');
    const COLS = 4, ROWS = 2, CW = 100 / COLS, CH = 100 / ROWS;
    const active = [];

    _BLOBS.forEach((g, i) => {
      const col = i % COLS, row = Math.floor(i / COLS);
      const x = col * CW + CW * 0.1 + Math.random() * CW * 0.8;
      const y = row * CH + CH * 0.1 + Math.random() * CH * 0.8;

      const el = document.createElement('span');
      el.className = 'gobo-blob';
      Object.assign(el.style, {
        width:  g.w + 'px', height: g.h + 'px',
        background: g.color,
        left: x + '%',  top: y + '%',
        filter: `blur(${g.bl}px)`,
        opacity: 0,
      });
      container.appendChild(el);

      gsap.to(el, { opacity: g.op, duration: 3, delay: i * 0.55, ease: 'power1.inOut' });

      active.push({ el, g, ox: Math.random() * 100, oy: Math.random() * 100,
                    range: 60 + Math.random() * 50 });
    });

    gsap.ticker.add(time => {
      const t = time * 0.07;
      active.forEach(({ el, g, ox, oy, range }) => {
        const px  = pnoise(t + ox,             oy           ) * range;
        const py  = pnoise(ox,                 t + oy       ) * range;
        const no  = (pnoise(t * 0.5 + ox * 3, oy * 3) + 1) * 0.5;
        const rot = g.rot + pnoise(t * 0.015 + ox, oy * 2) * 22;
        gsap.set(el, { x: px, y: py, rotate: rot, opacity: g.op * (0.55 + no * 0.70) });
      });
    });
  })();

  // ── Deco emojis — randomised pool, Perlin XY + rotation ──────
  (function initDecoEmojis() {
    const POOL  = ['🪐','🔮','🤔','🔍','🧪','🧠','🔬','🎥','🎮','👾','💻','🤖'];
    const ZONES = [
      { top: '7%',    right: '3%'  },
      { bottom: '9%', left:  '2%'  },
      { top: '45%',   right: '0%'  },
      { top: '18%',   left:  '3%'  },
    ];
    const container = document.querySelector('main');
    const picked    = POOL.slice().sort(() => Math.random() - 0.5).slice(0, 3);
    const active    = [];

    picked.forEach((emoji, i) => {
      const sz      = 90  + Math.floor(Math.random() * 100);
      const baseOp  = 0.12 + Math.random() * 0.08;
      const baseRot = (Math.random() - 0.5) * 50;
      const zone    = ZONES[i % ZONES.length];

      const el = document.createElement('span');
      el.setAttribute('aria-hidden', 'true');
      Object.assign(el.style, {
        position: 'absolute', fontSize: sz + 'px', lineHeight: '1',
        opacity: '0', pointerEvents: 'none', userSelect: 'none',
        willChange: 'transform', ...zone,
      });
      el.textContent = emoji;
      container.appendChild(el);

      gsap.to(el, { opacity: baseOp, duration: 2, delay: 0.8 + i * 0.35, ease: 'power1.inOut' });
      active.push({ el, baseRot,
        ox: Math.random() * 100, oy: Math.random() * 100,
        range: 20 + Math.random() * 20, rotRange: 6 + Math.random() * 8 });
    });

    gsap.ticker.add(time => {
      const t = time * 0.035;
      active.forEach(({ el, baseRot, ox, oy, range, rotRange }) => {
        const px = pnoise(t + ox,             oy             ) * range;
        const py = pnoise(ox,                 t + oy         ) * range;
        const pr = pnoise(ox * 1.7,           t * 0.6 + oy * 1.3) * rotRange;
        gsap.set(el, { x: px, y: py, rotate: baseRot + pr });
      });
    });
  })();

  // ── Starfield ──────────────────────────────────────────────
  (function initStarfield() {
    const container = document.getElementById('gobo');
    const COUNT = 70;
    for (let i = 0; i < COUNT; i++) {
      const s   = document.createElement('span');
      const dim = Math.random() < 0.65 ? 1 : Math.random() < 0.6 ? 2 : 3;
      const x   = Math.random() * 100;
      const y   = Math.random() * 100;
      const baseOp = 0.15 + Math.random() * 0.55;
      Object.assign(s.style, {
        position: 'absolute', borderRadius: '50%',
        width: dim + 'px', height: dim + 'px',
        left: x + '%', top: y + '%',
        background: 'rgba(255,255,255,1)',
        opacity: 0, pointerEvents: 'none',
        willChange: 'opacity',
      });
      container.appendChild(s);

      gsap.to(s, { opacity: baseOp, duration: 2 + Math.random() * 3,
                   delay: Math.random() * 6, ease: 'power1.inOut' });
      gsap.to(s, { opacity: baseOp * 0.12, duration: 1.2 + Math.random() * 4,
                   delay: Math.random() * 10, ease: 'sine.inOut',
                   repeat: -1, yoyo: true });
    }
  })();

})();
</script>

</body>
</html>
