<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Joe</title>
  <meta name="description" content="Code, camera, and everything in between. Built with intention.">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font:      -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                   "Helvetica Neue", Arial, sans-serif;
      --bg:        #000000;
      --bg-g:      radial-gradient(ellipse at 25% 25%, #0c0c22 0%, #060610 45%, #000 100%);
      --label-1:   rgba(255,255,255,0.92);
      --label-2:   rgba(255,255,255,0.55);
      --label-3:   rgba(255,255,255,0.25);
      --accent:    #0A84FF;
      --accent-bg: rgba(10,132,255,0.12);
      --fill-1:    rgba(255,255,255,0.04);
      --fill-2:    rgba(255,255,255,0.08);
      --sep:       rgba(255,255,255,0.09);
      --glass-bg:  rgba(255,255,255,0.05);
      --glass-bdr: rgba(255,255,255,0.10);
      --glass-shd: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    [data-theme="light"] {
      --bg:        #f5f5f7;
      --bg-g:      linear-gradient(160deg, #f5f5f7 0%, #e8e8ed 100%);
      --label-1:   rgba(0,0,0,0.88);
      --label-2:   rgba(0,0,0,0.55);
      --label-3:   rgba(0,0,0,0.28);
      --accent:    #0071E3;
      --accent-bg: rgba(0,113,227,0.08);
      --fill-1:    rgba(0,0,0,0.03);
      --fill-2:    rgba(0,0,0,0.06);
      --sep:       rgba(0,0,0,0.09);
      --glass-bg:  rgba(255,255,255,0.78);
      --glass-bdr: rgba(0,0,0,0.07);
      --glass-shd: 0 8px 40px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    html {
      background: var(--bg);
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font);
      background: var(--bg-g);
      color: var(--label-1);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      transition: background 0.4s, color 0.4s;
    }

    /* ── Grain ─────────────────────────────────────────── */
    .grain {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035; mix-blend-mode: overlay;
    }

    /* ── Fog ───────────────────────────────────────────── */
    #fog {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none; overflow: hidden;
      transition: opacity 0.4s;
    }
    [data-theme="light"] #fog { opacity: 0.35; }
    .fog-p {
      position: absolute; pointer-events: none;
      user-select: none; line-height: 1;
      will-change: transform, opacity;
    }

    /* ── Orbs ──────────────────────────────────────────── */
    .orb {
      position: absolute; border-radius: 50%;
      pointer-events: none; filter: blur(110px);
    }

    /* ── Header ────────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000; height: 52px;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 clamp(24px, 5vw, 80px);
      border-bottom: 1px solid var(--sep);
      background: rgba(0,0,0,0.55);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      transition: background 0.3s, border-color 0.3s;
    }
    [data-theme="light"] header { background: rgba(245,245,247,0.75); }

    .wordmark {
      font-size: 15px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--label-1);
      text-decoration: none; transition: color 0.2s;
    }
    .wordmark:hover { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 4px; }

    nav { display: flex; align-items: center; gap: 4px; }
    nav a {
      font-size: 13px; font-weight: 500;
      color: var(--label-2); text-decoration: none;
      padding: 6px 12px; border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    nav a:hover { color: var(--label-1); background: var(--fill-2); }

    #theme-btn {
      width: 32px; height: 28px; border-radius: 7px;
      background: var(--fill-2); border: 1px solid var(--glass-bdr);
      color: var(--label-2); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-left: 8px; transition: background 0.2s, color 0.2s;
    }
    #theme-btn:hover { background: var(--fill-1); color: var(--label-1); }

    /* ── Hero — full viewport, centered ───────────────── */
    main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: clamp(80px, 12vh, 140px) clamp(24px, 5vw, 80px) clamp(60px, 8vh, 100px);
      position: relative;
      min-height: clamp(560px, 100svh, 960px);
    }

    .hero-wordmark {
      font-size: clamp(0.75rem, 1.2vw, 1rem);
      font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--label-3);
      margin-bottom: clamp(28px, 5vh, 56px);
      opacity: 0;
    }

    .hero-hl {
      font-size: clamp(2.4rem, 6.5vw, 6.5rem);
      font-weight: 700; letter-spacing: -0.03em;
      line-height: 1.0; color: var(--label-1);
      max-width: 16ch;
      margin-bottom: 28px;
      opacity: 0;
    }
    .hero-hl .accent { color: var(--accent); }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 400; letter-spacing: -0.01em;
      color: var(--label-2);
      margin-bottom: clamp(40px, 6vh, 64px);
      opacity: 0;
    }

    /* Disciplines — plain dot-separated text */
    .disciplines {
      font-size: clamp(11px, 1.1vw, 13px);
      font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--label-3);
      margin-bottom: clamp(40px, 6vh, 64px);
      opacity: 0;
    }

    /* CTAs — text links only */
    .ctas {
      display: flex; align-items: center;
      justify-content: center; gap: 28px;
      flex-wrap: wrap; opacity: 0;
    }
    .cta-link {
      font-size: 14px; font-weight: 500;
      color: var(--label-2); text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.2s;
      display: flex; align-items: center; gap: 4px;
    }
    .cta-link:first-child { color: var(--accent); }
    .cta-link:hover { color: var(--label-1); }
    .cta-link:first-child:hover { filter: brightness(1.15); }

    /* ── Footer ────────────────────────────────────────── */
    footer {
      padding: 20px clamp(24px, 5vw, 80px);
      border-top: 1px solid var(--sep);
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .footer-sub {
      font-size: 11px; color: var(--label-3);
      letter-spacing: 0.04em;
    }
    .footer-links { display: flex; gap: 16px; }
    .footer-link {
      font-size: 11px; font-weight: 500; color: var(--label-3);
      text-decoration: none; letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .footer-link:hover { color: var(--accent); }
  </style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<div id="fog"   aria-hidden="true"></div>

<!-- Header -->
<header>
  <a class="wordmark" href="/">Studio Joe</a>
  <nav>
    <a href="/resume.html">Resume</a>
    <a href="https://www.linkedin.com/in/joey-v-287ba5394" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://github.com/jayvee6" target="_blank" rel="noopener">GitHub</a>
    <button id="theme-btn" aria-label="Toggle theme">☀️</button>
  </nav>
</header>

<!-- Hero -->
<main>

  <!-- Ambient orbs -->
  <div class="orb" style="width:70vw;height:70vw;top:-20%;left:-20%;background:radial-gradient(circle,rgba(10,132,255,0.14),transparent 70%)"></div>
  <div class="orb" style="width:50vw;height:50vw;bottom:-15%;right:-15%;background:radial-gradient(circle,rgba(88,86,214,0.11),transparent 70%)"></div>

  <h1 class="hero-hl" id="hh">
    Code, camera,<br>and everything<br>in between<span class="accent">.</span>
  </h1>

  <p class="hero-sub" id="hs">Built with intention.</p>

  <p class="disciplines" id="hd">
    Quality Engineering · Software Dev · Video Production · Game Development · Consulting
  </p>

  <div class="ctas" id="hc">
    <a class="cta-link" href="/resume.html">Resume ↗</a>
    <a class="cta-link" href="https://www.linkedin.com/in/joey-v-287ba5394" target="_blank" rel="noopener">LinkedIn ↗</a>
    <a class="cta-link" href="https://github.com/jayvee6" target="_blank" rel="noopener">GitHub ↗</a>
  </div>

</main>

<!-- Footer -->
<footer>
  <p class="footer-sub">© 2026 Studio Joe</p>
  <div class="footer-links">
    <a class="footer-link" href="/resume.html">Resume</a>
    <a class="footer-link" href="https://www.linkedin.com/in/joey-v-287ba5394" target="_blank" rel="noopener">LinkedIn ↗</a>
    <a class="footer-link" href="https://github.com/jayvee6" target="_blank" rel="noopener">GitHub ↗</a>
  </div>
</footer>

<script>
(function () {
  'use strict';

  const EASE = 'cubic-bezier(0.16, 1, 0.3, 1)';

  // ── Entrance animations ────────────────────────────────
  const tl = gsap.timeline({ defaults: { ease: EASE } });
  tl.to('#hh', { opacity: 1, duration: 0.75 },                    0.1)
    .fromTo('#hh', { y: 28 }, { y: 0, duration: 0.75 },          0.1)
    .to('#hs', { opacity: 1, duration: 0.6 },                     0.3)
    .fromTo('#hs', { y: 16 }, { y: 0, duration: 0.6 },           0.3)
    .to('#hd', { opacity: 1, duration: 0.5 },                     0.48)
    .fromTo('#hd', { y: 12 }, { y: 0, duration: 0.5 },           0.48)
    .to('#hc', { opacity: 1, duration: 0.5 },                     0.6)
    .fromTo('#hc', { y: 12 }, { y: 0, duration: 0.5 },           0.6);

  // ── Dark / Light toggle ────────────────────────────────
  const btn    = document.getElementById('theme-btn');
  let   isDark = localStorage.getItem('theme') !== 'light';

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    btn.textContent = isDark ? '☀️' : '🌙';
  }

  btn.addEventListener('click', () => {
    isDark = !isDark;
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    applyTheme();
  });

  applyTheme();

  // ── Karl the Fog ───────────────────────────────────────
  const FOG_LAYERS = [
    { min: 220, max: 520, blur: 32, opMin: 0.05, opMax: 0.09, durMin: 90,  durMax: 150, weight: 6 },
    { min: 130, max: 280, blur: 16, opMin: 0.07, opMax: 0.12, durMin: 55,  durMax: 90,  weight: 3 },
    { min: 80,  max: 160, blur:  6, opMin: 0.10, opMax: 0.18, durMin: 35,  durMax: 60,  weight: 1 },
  ];
  const NAME_SIZES = [320, 480, 640, 800];

  function pickLayer() {
    const total = FOG_LAYERS.reduce((s, l) => s + l.weight, 0);
    let r = Math.random() * total;
    for (const l of FOG_LAYERS) { r -= l.weight; if (r <= 0) return l; }
    return FOG_LAYERS[0];
  }

  function spawnCloud() {
    const fog    = document.getElementById('fog');
    const isName = Math.random() < 0.20;
    const el     = document.createElement('span');
    el.className = 'fog-p';

    let sz, op, dur, blurPx;

    if (isName) {
      sz     = NAME_SIZES[Math.floor(Math.random() * NAME_SIZES.length)];
      op     = 0.03 + Math.random() * 0.03;
      dur    = 110 + Math.random() * 80;
      blurPx = 28 + Math.random() * 20;
      el.textContent = 'JOEY';
      Object.assign(el.style, {
        fontFamily: 'var(--font)', fontWeight: 800,
        letterSpacing: '-0.05em', lineHeight: 1,
        whiteSpace: 'nowrap', color: '#fff',
        fontSize: sz + 'px',
      });
    } else {
      const l = pickLayer();
      sz     = l.min + Math.random() * (l.max - l.min);
      op     = l.opMin + Math.random() * (l.opMax - l.opMin);
      dur    = l.durMin + Math.random() * (l.durMax - l.durMin);
      blurPx = l.blur;
      el.textContent = '☁️';
      Object.assign(el.style, { fontSize: sz + 'px' });
    }

    const rgt = Math.random() > 0.2;
    const y   = Math.random() * 100;
    const dy  = (Math.random() - 0.5) * 60;

    Object.assign(el.style, {
      top: y + 'vh', left: rgt ? '110vw' : '-30vw',
      filter: `blur(${blurPx}px)`, opacity: 0,
    });
    fog.appendChild(el);

    gsap.timeline({ onComplete: () => el.remove() })
      .to(el, { opacity: op, duration: dur * 0.12, ease: 'power1.in' })
      .to(el, { left: rgt ? '-30vw' : '110vw', y: dy, duration: dur, ease: 'none' }, 0)
      .to(el, { opacity: 0, duration: dur * 0.12, ease: 'power1.out' }, `-=${dur * 0.12}`);
  }

  for (let i = 0; i < 5; i++) setTimeout(spawnCloud, i * 1200);
  setInterval(spawnCloud, 6000);

})();
</script>
</body>
</html>
